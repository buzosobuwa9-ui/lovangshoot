<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gallery</title>

  <style>
    body {
      background: black;
      margin: 0;
      font-family: sans-serif;
      color: white;
    }

    .artist-title {
      padding: 20px 10px 5px;
      font-size: 18px;
      font-weight: bold;
    }

    .gallery {
      column-count: 4;
      column-gap: 10px;
      padding: 10px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="gallery"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
