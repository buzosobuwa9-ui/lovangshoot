<!DOCTYPE html>
<html>
<head>
<title>Artist | LovangShoot</title>

<style>
body {
  background:#000;
  color:white;
  font-family:sans-serif;
}

h1 {
  text-align:center;
  margin:30px;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
  padding:40px;
}

.gallery img {
  width:100%;
  height:350px;
  object-fit:cover;
  border-radius:10px;
  transition:0.4s;
}

.gallery img:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<h1 id="title"></h1>

<div class="gallery" id="gallery"></div>

<script>
// GET ARTIST NAME FROM URL
const params = new URLSearchParams(window.location.search);
const artist = params.get("name");

// SET TITLE
document.getElementById("title").innerText = artist.toUpperCase();

// LOAD IMAGES.TXT
fetch(`assets/artists/${artist}/images.txt`)
.then(res => res.text())
.then(data => {
  const images = data.split("\n");

  images.forEach(img => {
    if(img.trim() !== "") {
      const image = document.createElement("img");
      image.src = `assets/artists/${artist}/${img}`;
      document.getElementById("gallery").appendChild(image);
    }
  });
});
</script>

</body>
</html>
